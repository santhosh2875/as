# Deploy the v3 static site from this monorepo.
# Netlify: Base directory (if any) empty, or set “Publish directory” to `v3` if you skip this file.

[build]
  publish = "v3"

# No npm/build step — plain HTML/CSS/JS.

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
